<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cardápio Digital</title>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}

#container{
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

img,video{
    width:100vw;
    height:100vh;
    object-fit:contain;
}
</style>
</head>
<body>

<div id="container"></div>

<audio id="bgm" autoplay loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

async function carregarMidia(){

    const resposta = await fetch(
        'config.json?v=' + new Date().getTime()
    );

    const config = await resposta.json();

    const container =
        document.getElementById("container");

    container.innerHTML = "";

    if(config.tipo === "imagem" ||
       config.tipo === "gif"){

        const img =
            document.createElement("img");

        img.src =
            config.arquivo +
            "?v=" +
            new Date().getTime();

        container.appendChild(img);
    }

    if(config.tipo === "video"){

        const video =
            document.createElement("video");

        video.src =
            config.arquivo +
            "?v=" +
            new Date().getTime();

        video.autoplay = true;
        video.loop = true;
        video.muted = false;
        video.playsInline = true;

        container.appendChild(video);
    }
}

carregarMidia();

setInterval(
    carregarMidia,
    60000
);

</script>

</body>
</html>
