<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
}

#container{
    width:100vw;
    height:100vh;
}

img,video{
    width:100%;
    height:100%;
    object-fit:contain;
}
</style>
</head>
<body>

<div id="container"></div>

<script>
async function carregar() {

    const resposta = await fetch(
        "config.json?v=" + Date.now()
    );

    const dados = await resposta.json();

    const arquivo = dados.arquivo.toLowerCase();

    const container =
        document.getElementById("container");

    container.innerHTML = "";

    if (
        arquivo.endsWith(".jpg") ||
        arquivo.endsWith(".jpeg") ||
        arquivo.endsWith(".png") ||
        arquivo.endsWith(".gif") ||
        arquivo.endsWith(".webp")
    ) {
        container.innerHTML =
            `<img src="${dados.arquivo}?v=${Date.now()}">`;
    }

    else if (
        arquivo.endsWith(".mp4") ||
        arquivo.endsWith(".webm")
    ) {
        container.innerHTML =
            `<video autoplay loop muted playsinline>
                <source src="${dados.arquivo}?v=${Date.now()}">
             </video>`;
    }
}

carregar();

setInterval(carregar, 60000);
</script>

</body>
</html>
